version: 1
disable_existing_loggers: False

formatters:
  json_formatter:
    (): pythonjsonlogger.jsonlogger.JsonFormatter
    format: "%(asctime)s %(name)s %(levelname)s %(message)s %(environment)s %(service_name)s %(request_id)s %(job_id)s"
    rename_fields:
      levelname: level
      asctime: time

filters:
  add_context:
    (): app.core.logging.context.ContextFilter

handlers:
  console:
    class: logging.StreamHandler
    formatter: json_formatter
    level: INFO  # Default, overridden by LOG_LEVEL env var
    stream: ext://sys.stdout
    filters: [add_context]

loggers:
  app:
    level: INFO  # Default, overridden by LOG_LEVEL env var
    handlers: [console]
    propagate: false

root:
  level: INFO  # Default, overridden by LOG_LEVEL env var
  handlers: [console]
